<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Traffic Signal Visualization</title>
<style>
  body {
    margin: 0;
    background: #1a1a2e;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  h2 { color: #fff; margin-bottom: 8px; font-size: 20px; letter-spacing: 2px; }
  #seqInfo { color: #00f5c4; font-size: 14px; margin-bottom: 12px; letter-spacing: 1px; }
 
  #intersection {
    position: relative;
    width: 500px; height: 500px;
    background: #2a2a3e;
    border-radius: 8px;
    overflow: hidden;
  }
  .v-road {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 120px; height: 100%; background: #3a3a4a;
  }
  .h-road {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 100%; height: 120px; background: #3a3a4a;
  }
  .center {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    width: 120px; height: 120px; background: #3a3a4a;
  }
  .dash-v {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 3px; height: 100%;
    background: repeating-linear-gradient(to bottom, #f59e0b55 0,#f59e0b55 20px,transparent 20px,transparent 40px);
  }
  .dash-h {
    position: absolute; top: 50%; transform: translateY(-50%);
    height: 3px; width: 100%;
    background: repeating-linear-gradient(to right, #f59e0b55 0,#f59e0b55 20px,transparent 20px,transparent 40px);
  }
 
  /* TRAFFIC LIGHT */
  .tl { position: absolute; z-index: 10; display: flex; flex-direction: column; align-items: center; }
  .tl-box {
    background: #111; border: 2px solid #444; border-radius: 5px;
    padding: 4px; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.8);
  }
  .tl-bulb {
    width: 11px; height: 11px; border-radius: 50%;
    background: #1a1a1a; border: 1px solid #333;
    transition: background 0.25s, box-shadow 0.25s;
  }
  .tl-bulb.r { background: #ff2020; box-shadow: 0 0 8px #ff2020, 0 0 18px rgba(255,32,32,0.6); }
  .tl-bulb.y { background: #ffcc00; box-shadow: 0 0 8px #ffcc00, 0 0 18px rgba(255,204,0,0.6); }
  .tl-bulb.g { background: #18ee40; box-shadow: 0 0 8px #18ee40, 0 0 18px rgba(24,238,64,0.6); }
  .tl-pole { width: 3px; height: 16px; background: #555; border-radius: 2px; }
  .tl-base { width: 14px; height: 4px; background: #555; border-radius: 2px; }
 
  /* placed in pavement corners, off the road */
  #tlN { top: 108px; left: 348px; }
  #tlS { top: 348px; left: 132px; }
  #tlE { top: 348px; left: 348px; }
  #tlW { top: 108px; left: 132px; }
 
  .dlabel { position: absolute; color: #888; font-size: 12px; font-weight: bold; letter-spacing: 1px; z-index: 5; }
  #lblN { top: 8px;    left: 50%; transform: translateX(-50%); }
  #lblS { bottom: 8px; left: 50%; transform: translateX(-50%); }
  #lblE { right: 8px;  top: 50%; transform: translateY(-50%); }
  #lblW { left: 8px;   top: 50%; transform: translateY(-50%); }
 
  .car { position: absolute; font-size: 36px; z-index: 20; }
 
  #statusBox {
    margin-top: 12px; color: #fff;
    font-size: 15px; letter-spacing: 1px; min-height: 24px;
  }
  #statusBox span { color: #00f5c4; font-weight: bold; }
 
  /* deadlock screen */
  #deadlockMsg {
    display: none;
    position: absolute; inset: 0;
    background: rgba(200,0,0,0.15);
    color: #ff4444;
    font-size: 28px; font-weight: bold;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    z-index: 50;
  }
</style>
</head>
<body>
 
<h2>🚦 TRAFFIC SIGNAL VISUALIZATION</h2>
<div id="seqInfo">Safe Sequence: <span id="seqDisplay">Loading...</span></div>
 
<div id="intersection">
  <div class="v-road"></div>
  <div class="h-road"></div>
  <div class="center"></div>
  <div class="dash-v"></div>
  <div class="dash-h"></div>
 
  <div class="dlabel" id="lblN">NORTH</div>
  <div class="dlabel" id="lblS">SOUTH</div>
  <div class="dlabel" id="lblE">EAST</div>
  <div class="dlabel" id="lblW">WEST</div>
 
  <div class="tl" id="tlN">
    <div class="tl-box">
      <div class="tl-bulb r" id="rN"></div>
      <div class="tl-bulb"   id="yN"></div>
      <div class="tl-bulb"   id="gN"></div>
    </div>
    <div class="tl-pole"></div><div class="tl-base"></div>
  </div>
  <div class="tl" id="tlS">
    <div class="tl-box">
      <div class="tl-bulb r" id="rS"></div>
      <div class="tl-bulb"   id="yS"></div>
      <div class="tl-bulb"   id="gS"></div>
    </div>
    <div class="tl-pole"></div><div class="tl-base"></div>
  </div>
  <div class="tl" id="tlE">
    <div class="tl-box">
      <div class="tl-bulb r" id="rE"></div>
      <div class="tl-bulb"   id="yE"></div>
      <div class="tl-bulb"   id="gE"></div>
    </div>
    <div class="tl-pole"></div><div class="tl-base"></div>
  </div>
  <div class="tl" id="tlW">
    <div class="tl-box">
      <div class="tl-bulb r" id="rW"></div>
      <div class="tl-bulb"   id="yW"></div>
      <div class="tl-bulb"   id="gW"></div>
    </div>
    <div class="tl-pole"></div><div class="tl-base"></div>
  </div>
 
  <div class="car" id="carN" style="top:-50px; left:230px;">🚗</div>
  <div class="car" id="carS" style="top:520px; left:240px;">🚙</div>
  <div class="car" id="carE" style="top:240px; left:520px;">🚕</div>
  <div class="car" id="carW" style="top:230px; left:-50px;">🚓</div>
 
  <div id="deadlockMsg">⚠️ DEADLOCK DETECTED<br><span style="font-size:16px;color:#fff">Traffic cannot proceed safely</span></div>
</div>
 
<div id="statusBox">Reading sequence from C program...</div>
 
<script>
const K      = { North:"N", South:"S", East:"E", West:"W" };
const carIds = { North:"carN", South:"carS", East:"carE", West:"carW" };
 
function setSignal(dir, state) {
  const k = K[dir];
  ["r","y","g"].forEach(id => document.getElementById(id+k).className = "tl-bulb");
  if (state === "red")    document.getElementById("r"+k).className = "tl-bulb r";
  if (state === "yellow") document.getElementById("y"+k).className = "tl-bulb y";
  if (state === "green")  document.getElementById("g"+k).className = "tl-bulb g";
}
function setAllRed() {
  Object.keys(K).forEach(d => setSignal(d, "red"));
}
 
function moveCar(dir) {
  return new Promise(resolve => {
    const car = document.getElementById(carIds[dir]);
    let sX, sY, eX, eY;
    if      (dir==="North") { sX=230; sY=-50;  eX=230; eY=560; }
    else if (dir==="South") { sX=240; sY=560;  eX=240; eY=-50; }
    else if (dir==="East")  { sX=560; sY=240;  eX=-50; eY=240; }
    else                    { sX=-50; sY=230;  eX=560; eY=230; }
    car.style.left = sX+"px"; car.style.top = sY+"px";
    const dur = 2200; let t0 = null;
    function step(t) {
      if (!t0) t0 = t;
      const p = Math.min((t-t0)/dur, 1);
      const e = p<0.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
      car.style.left = (sX+(eX-sX)*e)+"px";
      car.style.top  = (sY+(eY-sY)*e)+"px";
      p < 1 ? requestAnimationFrame(step) : resolve();
    }
    requestAnimationFrame(step);
  });
}
 
async function run(safeSequence) {
  const status = document.getElementById('statusBox');
  setAllRed();
  for (let i = 0; i < safeSequence.length; i++) {
    const dir = safeSequence[i];
    setSignal(dir, "yellow");
    status.innerHTML = `Step ${i+1}/${safeSequence.length} → <span>${dir}</span> — READY 🟡`;
    await new Promise(r => setTimeout(r, 700));
    setSignal(dir, "green");
    status.innerHTML = `Step ${i+1}/${safeSequence.length} → <span>${dir}</span> — GO 🟢`;
    await moveCar(dir);
    setSignal(dir, "red");
    await new Promise(r => setTimeout(r, 400));
  }
  status.innerHTML = `✅ All directions cleared — <span>Deadlock Avoided!</span>`;
}
 
/* ── READ sequence.txt WRITTEN BY C PROGRAM ── */
(async () => {
  const status = document.getElementById('statusBox');
  try {
    const text = await fetch("sequence.txt?nocache=" + Date.now())
                   .then(r => { if(!r.ok) throw new Error(); return r.text(); });
 
    const content = text.trim();
 
    if (content === "DEADLOCK") {
      document.getElementById('seqDisplay').textContent = "DEADLOCK DETECTED";
      document.getElementById('deadlockMsg').style.display = "flex";
      status.innerHTML = `⚠️ <span>Deadlock detected — No safe sequence exists!</span>`;
      return;
    }
 
    const safeSequence = content.split(",").map(s => s.trim());
    document.getElementById('seqDisplay').textContent = safeSequence.join(" → ");
    run(safeSequence);
 
  } catch(e) {
    status.innerHTML = `❌ Could not read <span>sequence.txt</span> — Run your C program first, then open this via Live Server`;
  }
})();
</script>
</body>
</html>
